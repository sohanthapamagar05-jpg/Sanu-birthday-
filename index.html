<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Sanu ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

.container{
color:white;
}

h1{
font-size:40px;
animation:fade 2s infinite alternate;
}

p{
font-size:20px;
margin:15px;
}

.cake{
font-size:90px;
margin:20px;
animation:bounce 1.5s infinite;
}

.candle{
font-size:50px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff3366;
color:white;
font-size:18px;
margin:10px;
}

.photo{
width:220px;
height:220px;
object-fit:cover;
border-radius:20px;
margin:15px;
}

.wish{
margin-top:15px;
}

@keyframes fade{
from{opacity:.5;}
to{opacity:1;}
}

@keyframes bounce{
50%{transform:translateY(-15px);}
}

.cut{
animation:shake .5s;
}

@keyframes shake{
25%{transform:rotate(10deg);}
50%{transform:rotate(-10deg);}
75%{transform:rotate(10deg);}
}
</style>

</head>

<body>

<div class="container">

<h1>Happy Birthday Sanu ❤️</h1>

<div class="cake" id="cake">
🎂
</div>

<div class="candle" id="candle">
🕯️
</div>

<button onclick="cutCake()">
Cut Cake 🎂
</button>

<img id="photo" class="photo" src="sanu1.jpg">

<div class="wish">
<p>
Happy Birthday Mayalu 😛💗<br>
Always keep smiling ✨<br>
You are special to me ❤️
</p>
</div>

</div>


<script>

function cutCake(){

document.getElementById("cake").classList.add("cut");

document.getElementById("candle").innerHTML="💨";

alert("Happy Birthday Sanu ❤️🎂");

}


let photos=[
"sanu1.jpg",
"sanu2.jpg",
"sanu3.jpg",
"sanu4.jpg",
"sanu5.jpg"
];

let i=0;

setInterval(function(){

i++;

if(i>=photos.length){
i=0;
}

document.getElementById("photo").src=photos[i];

},3000);

</script>

</body>
</html>
